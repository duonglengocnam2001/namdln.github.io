<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư Viện Toán Học</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
  --primary:#1e293b;
  --accent:#3b82f6;
  --white:#ffffff;
  --bg:#eef2f7;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

header{
  background:linear-gradient(135deg,#1e293b,#3b82f6);
  color:white;
  padding:40px 20px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:2rem;
}

header p{
  opacity:0.9;
}

.main-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
  width:100%;
}

.card{
  background:var(--white);
  height:220px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-decoration:none;
  color:var(--primary);
  font-weight:bold;
  font-size:1.4rem;
  transition:all 0.3s ease;
}

.card i.main-icon{
  font-size:2.2rem;
  margin-bottom:10px;
  color:var(--accent);
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 20px 40px rgba(59,130,246,0.25);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(59,130,246,0.95);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:0.3s;
  color:white;
}

.card:hover .overlay{
  opacity:1;
}

.overlay i{
  font-size:2.5rem;
  margin-bottom:10px;
}

.overlay span{
  font-size:0.9rem;
  letter-spacing:1px;
}

footer{
  text-align:center;
  padding:20px;
  font-size:0.8rem;
  color:#666;
}

/* DARK MODE */
.dark{
  --primary:#0f172a;
  --bg:#020617;
  --white:#111827;
}

.toggle{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<button class="toggle" onclick="toggleDark()">🌙</button>

<header>
  <h1>Hệ Thống Tài Liệu Toán Học</h1>
  <p>Chọn khối lớp để bắt đầu</p>
</header>

<div class="main-grid">

<a href="lop10.html" class="card">
  <i class="fas fa-square-root-alt main-icon"></i>
  Toán 10
  <div class="overlay">
    <i class="fas fa-file-pdf"></i>
    <span>Xem tài liệu</span>
  </div>
</a>

<a href="lop11.html" class="card">
  <i class="fas fa-chart-line main-icon"></i>
  Toán 11
  <div class="overlay">
    <i class="fas fa-book"></i>
    <span>Xem tài liệu</span>
  </div>
</a>

<a href="lop12.html" class="card">
  <i class="fas fa-graduation-cap main-icon"></i>
  Toán 12
  <div class="overlay">
    <i class="fas fa-file"></i>
    <span>Xem tài liệu</span>
  </div>
</a>

<a href="daihoc.html" class="card">
  <i class="fas fa-university main-icon"></i>
  Đại học
  <div class="overlay">
    <i class="fas fa-folder-open"></i>
    <span>Xem tài liệu</span>
  </div>
</a>

</div>

<footer>
© 2026 - Math Library
</footer>

<script>
function toggleDark(){
  document.body.classList.toggle('dark');
}
</script>

</body>
</html>
