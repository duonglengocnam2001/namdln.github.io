<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dương Lê Ngọc Nam</title>

<style>
body {
    margin: 0;
    font-family: "Times New Roman", serif;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 300px;
    border-right: 1px solid #ccc;
    padding: 15px;
    overflow-y: auto;
}

.sidebar h2 {
    margin-top: 0;
}

.sidebar input {
    width: 100%;
    padding: 6px;
    margin-bottom: 10px;
}

/* Viewer */
.viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Toolbar */
.toolbar {
    padding: 10px;
    border-bottom: 1px solid #ccc;
    background: #f5f5f5;
}

iframe {
    flex: 1;
    width: 100%;
    border: none;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>📚 Tài liệu</h2>

        <input type="text" placeholder="Tìm..." onkeyup="searchDocs()" id="search">

        <ul id="docs">
            <li><a href="#" onclick="openPDF('files/Hinh hoc va do luong - font moi.pdf')">📄 Đại số đại cương</a></li>
            <li><a href="#" onclick="openPDF('files/xacsuat.pdf')">📄 Xác suất</a></li>
            <li><a href="#" onclick="openPDF('files/nhom.pdf')">📄 Nhóm và nửa nhóm</a></li>
        </ul>
    </div>

    <!-- VIEWER -->
    <div class="viewer">

        <div class="toolbar">
            <span id="title">Chọn tài liệu để xem</span>
        </div>

        <iframe id="pdfViewer"></iframe>

    </div>

</div>

<script>
function openPDF(file) {
    document.getElementById("pdfViewer").src = file;

    // cập nhật tiêu đề
    document.getElementById("title").innerText = file.split('/').pop();
}

function searchDocs() {
    let input = document.getElementById("search").value.toLowerCase();
    let items = document.getElementById("docs").getElementsByTagName("li");

    for (let i = 0; i < items.length; i++) {
        let text = items[i].innerText.toLowerCase();
        items[i].style.display = text.includes(input) ? "" : "none";
    }
}
</script>

</body>
</html>
