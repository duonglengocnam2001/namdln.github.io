<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài liệu Toán Học</title>

<!-- ICON (Font Awesome) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* ================== CẤU HÌNH MÀU ================== */
:root{
  --primary:#1e293b;   /* Màu chính (header, chữ chính) */
  --accent:#3b82f6;    /* Màu nhấn (hover, button) */
  --white:#ffffff;     /* Màu nền card */
  --bg:#eef2f7;        /* Màu nền toàn trang */
  --header-title: #020617;
}
/* ================== CẤU TRÚC CHUNG ================== */
body{
  margin:0;
  font-family:'Calibri', Helvetica, Arial, sans-serif;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ================== HEADER ================== */
header{
  background:linear-gradient(0deg, #eef2f7, #1e40af);
  color:white;
  padding:40px 20px;
  text-align:center;
}
/* Header khi dark mode */
.dark header{
  background:linear-gradient(0deg,#020617,#040F2B);
}
header h1 {
  background: linear-gradient(to right, #020617, #eef2f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
header p{
  opacity:0.8;
}
/* ================== LƯỚI 4 Ô ================== */
.main-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); /* Tự chia cột */
  gap:40px;
  max-width:1500px;
  margin:auto;
  padding:40px 20px;
  width:100%;
}

/* ================== Ô ================== */
.card{
  background:var(--white);
  height:250px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-decoration:none;
  color:var(--primary);
  font-weight:bold;
  font-size:1.4rem;
  transition:all 0.3s ease;
}

/* Icon chính giữa card */
.card i.main-icon{
  font-size:2.2rem;
  margin-bottom:10px;
  color:var(--accent);
}

/* Hiệu ứng hover */
.card:hover{
  transform:translateY(-10px) scale(1.2);
  box-shadow:0 20px 40px rgba(59,130,246,0.25);
}

/* ================== LỚP PHỦ (HOVER) ================== */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(59,130,246,0.95);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0; /* Ẩn mặc định */
  transition:0.3s;
  color:white;
}

.card:hover .overlay{
  opacity:1.1; /* Hiện khi hover */
}

.overlay i{
  font-size:2.5rem;
  margin-bottom:10px;
}

.overlay span{
  font-size:0.9rem;
  letter-spacing:1px;
}

/* ================== FOOTER ================== */
footer{
  text-align:center;
  padding:20px;
  font-size:0.8rem;
  color:#666;
}

/* ================== DARK MODE ================== */
.dark{
  --primary:#e2e8f0;   /* chữ sáng */
  --bg:#020617;        /* nền tối */
  --white:#111827;     /* nền card */
  --header-title: #eef2f7;}

/* Sửa màu chữ khi dark mode */
.dark body{
  color:#e5e7eb;
}

.dark .card{
  color:#e5e7eb;
}

.dark footer{
  color:#9ca3af;
}

/* Nút bật dark mode */
.toggle{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<!-- Nút bật/tắt dark mode -->
<button class="toggle" onclick="toggleDark()">🌙</button>

<header>
  <h1>Tài Liệu Toán Học</h1>
  <p></p>
</header>

<!-- ================== DANH SÁCH KHỐI ================== -->
<div class="main-grid">

<!-- CARD 1 -->
<a href="lop10.html" class="card">
  <i class="fas fa-function main-icon"></i>
  Toán 10
  <div class="overlay">
    <i class="fas fa-file-pdf"></i>
    <span>Xem tài liệu</span>
  </div>
</a>

<!-- CARD 2 -->
<a href="lop11.html" class="card">
  <i class="fas fa-chart-line main-icon"></i>
  Toán 11
  <div class="overlay">
    <i class="fas fa-book"></i>
    <span>Xem tài liệu</span>
  </div>
</a>

<!-- CARD 3 -->
<a href="lop12.html" class="card">
  <i class="fas fa-graduation-cap main-icon"></i>
  Toán 12
  <div class="overlay">
    <i class="fas fa-file"></i>
    <span>Xem tài liệu</span>
  </div>
</a>

<!-- CARD 4 -->
<a href="daihoc.html" class="card">
  <i class="fas fa-university main-icon"></i>
  Đại học
  <div class="overlay">
    <i class="fas fa-folder-open"></i>
    <span>Xem tài liệu</span>
  </div>
</a>

</div>

<footer>
© 2026 - Math Library
</footer>

<script>
/* ================== DARK MODE FUNCTION ================== */
function toggleDark(){
  document.body.classList.toggle('dark');
}
</script>

</body>
</html>
