<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Toán Học</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* [HƯỚNG DẪN]: Bảng màu chủ đạo */
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --white: #ffffff;
            --bg: #f0f2f5;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: var(--primary); color: white; padding: 2rem; text-align: center; }

        /* [HƯỚNG DẪN]: Cấu trúc 4 khối nằm giữa màn hình */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* Tự động chia cột */
            gap: 25px;
            max-width: 1000px;
            margin: auto; /* Căn giữa toàn bộ khối */
            padding: 40px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* [HƯỚNG DẪN]: Thiết kế từng ô vuông (Card) */
        .card {
            background: var(--white);
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px; /* Bo góc khối */
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.5rem;
        }

        /* [HƯỚNG DẪN]: Hiệu ứng khi di chuột vào ô (Hover) */
        .card:hover {
            transform: translateY(-10px); /* Nhảy lên một chút */
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        /* [HƯỚNG DẪN]: Phần Icon "Xem tài liệu" ẩn bên dưới */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(52, 152, 219, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0; /* Mặc định ẩn */
            transition: opacity 0.3s ease;
        }

        .card:hover .overlay {
            opacity: 1; /* Hiện lên khi di chuột */
        }

        .overlay i { font-size: 2.5rem; margin-bottom: 10px; }
        .overlay span { font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }

        footer { text-align: center; padding: 20px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>Hệ Thống Tài Liệu Toán Học</h1>
    <p>Chọn khối lớp để bắt đầu học tập</p>
</header>

<div class="main-grid">
    <a href="lop10.html" class="card">
        Toán 10
        <div class="overlay">
            <i class="fas fa-file-pdf"></i>
            <span>Xem tài liệu</span>
        </div>
    </a>

    <a href="lop11.html" class="card">
        Toán 11
        <div class="overlay">
            <i class="fas fa-book"></i>
            <span>Xem tài liệu</span>
        </div>
    </a>

    <a href="lop12.html" class="card">
        Toán 12
        <div class="overlay">
            <i class="fas fa-graduation-cap"></i>
            <span>Xem tài liệu</span>
        </div>
    </a>

    <a href="daihoc.html" class="card">
        Đại học
        <div class="overlay">
            <i class="fas fa-university"></i>
            <span>Xem tài liệu</span>
        </div>
    </a>
</div>

<footer>
    &copy; 2026 - Designed for Students
</footer>

</body>
</html>
